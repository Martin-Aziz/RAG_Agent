<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Agentic RAG Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Poppins:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="bg-gradient"></div>
  <main class="app-root">
    <header class="app-header">
      <div class="brand">
        <div class="logo">AR</div>
        <div class="title">
          <div class="name">Agentic RAG</div>
          <div class="subtitle">Retrieval-augmented assistant</div>
        </div>
      </div>
      <nav class="header-controls">
        <select id="mode" aria-label="RAG Mode">
          <option value="parrag">PAR-RAG</option>
          <option value="hoprag">HopRAG</option>
        </select>
      </nav>
    </header>

    <section class="panel glass">
      <div id="chat" class="chat" aria-live="polite"></div>

      <form id="askForm" class="composer" autocomplete="off">
        <label class="sr-only" for="question">Ask a question</label>
        <input id="question" name="question" placeholder="Ask anything about your docs..." />
        <div class="controls">
          <button type="submit" class="btn-primary">Send</button>
        </div>
      </form>
    </section>

    <footer class="app-footer">
      <span>Built with a modern RAG stack · <small>Lightweight demo</small></span>
    </footer>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
