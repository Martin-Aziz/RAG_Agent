[pytest]
# Pytest configuration for RAG Agent test suite

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
    unit: Unit tests for individual components
    integration: Integration tests for end-to-end flows
    blackbox: Black-box API contract tests
    behavior: Behavioral tests for model output quality
    adversarial: Security and adversarial tests
    performance: Performance and load tests
    monitoring: Observability and telemetry tests
    regression: Regression and golden query tests
    slow: Tests that take > 1 second
    flaky: Tests with acceptable variance (model outputs)
    requires_gpu: Tests requiring GPU acceleration
    requires_external: Tests requiring external services (disabled by default)

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=core
    --cov=app
    --cov=api
    --cov-report=html:reports/coverage_html
    --cov-report=xml:reports/coverage.xml
    --cov-report=term-missing
    --junitxml=reports/junit.xml
    --html=reports/test_report.html
    --self-contained-html
    -p no:warnings

# Test paths
testpaths = tests

# Coverage options
[coverage:run]
source = core,app,api
omit =
    */tests/*
    */__pycache__/*
    */venv/*
    */.venv/*
    */conftest.py

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

# Minimum coverage thresholds
fail_under = 85

[coverage:html]
directory = reports/coverage_html
