name: RAG Agent Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'
  COVERAGE_THRESHOLD: 85
  RAG_API_BASE_URL: http://localhost:8000
  EMBEDDING_MODEL: test-embeddings-v1
  LLM_MODEL: gpt-5-codecs-test
  VECTOR_DB: faiss
  TOP_K: 5
  CHUNK_SIZE: 1000
  CHUNK_OVERLAP: 200

jobs:
  # Job 1: Lint and code quality
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort mypy
          
      - name: Check formatting with black
        run: black --check --diff core/ app/ api/ tests/
        continue-on-error: true
        
      - name: Check import sorting
        run: isort --check-only --diff core/ app/ api/ tests/
        continue-on-error: true
        
      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 core/ app/ api/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings
          flake8 core/ app/ api/ tests/ --count --exit-zero --max-complexity=15 --max-line-length=120 --statistics

  # Job 2: Unit tests
  unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ['3.10', '3.11']
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'tests/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
            
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r tests/requirements.txt
          
      - name: Generate synthetic test corpus
        run: python tests/fixtures/synthetic_corpus_generator.py
        
      - name: Run unit tests
        run: |
          pytest tests/unit/ \
            -v \
            -m unit \
            --cov=core \
            --cov=app \
            --cov=api \
            --cov-report=xml:reports/coverage-unit.xml \
            --cov-report=html:reports/coverage-unit-html \
            --junitxml=reports/junit-unit.xml \
            -n auto
            
      - name: Upload unit test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: unit-test-results-${{ matrix.python-version }}
          path: reports/
          
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./reports/coverage-unit.xml
          flags: unit
          name: unit-tests-${{ matrix.python-version }}

  # Job 3: Integration tests
  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r tests/requirements.txt
          
      - name: Generate synthetic test corpus
        run: python tests/fixtures/synthetic_corpus_generator.py
        
      - name: Run integration tests
        run: |
          pytest tests/integration/ \
            -v \
            -m integration \
            --cov=core \
            --cov=app \
            --cov=api \
            --cov-report=xml:reports/coverage-integration.xml \
            --junitxml=reports/junit-integration.xml
            
      - name: Upload integration test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: integration-test-results
          path: reports/

  # Job 4: Black-box API tests
  blackbox-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      # Note: In real scenario, start API server as a service
      # api:
      #   image: rag-agent:latest
      #   ports:
      #     - 8000:8000
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r tests/requirements.txt
          
      - name: Run black-box tests
        run: |
          pytest tests/blackbox/ \
            -v \
            -m blackbox \
            --junitxml=reports/junit-blackbox.xml
            
      - name: Upload black-box test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: blackbox-test-results
          path: reports/

  # Job 5: Behavioral tests (with retries for flaky tests)
  behavioral-tests:
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r tests/requirements.txt
          pip install pytest-rerunfailures
          
      - name: Generate synthetic test corpus
        run: python tests/fixtures/synthetic_corpus_generator.py
        
      - name: Run behavioral tests
        run: |
          pytest tests/behavior/ \
            -v \
            -m behavior \
            --reruns 2 \
            --reruns-delay 1 \
            --junitxml=reports/junit-behavior.xml
            
      - name: Upload behavioral test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: behavioral-test-results
          path: reports/

  # Job 6: Security/Adversarial tests
  security-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r tests/requirements.txt
          
      - name: Run adversarial tests
        run: |
          pytest tests/adversarial/ \
            -v \
            -m adversarial \
            --junitxml=reports/junit-adversarial.xml
            
      - name: Upload security test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: security-test-results
          path: reports/

  # Job 7: Performance tests (informational, allowed to fail)
  performance-tests:
    runs-on: ubuntu-latest
    needs: integration-tests
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r tests/requirements.txt
          
      - name: Run performance tests
        run: |
          pytest tests/performance/ \
            -v \
            -m performance \
            --benchmark-only \
            --benchmark-json=reports/benchmark.json \
            --junitxml=reports/junit-performance.xml
            
      - name: Upload performance test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: performance-test-results
          path: reports/

  # Job 8: Regression tests (golden queries)
  regression-tests:
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r tests/requirements.txt
          
      - name: Generate synthetic test corpus
        run: python tests/fixtures/synthetic_corpus_generator.py
        
      - name: Run regression tests
        run: |
          pytest tests/regression/ \
            -v \
            -m regression \
            --junitxml=reports/junit-regression.xml
            
      - name: Upload regression test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: regression-test-results
          path: reports/

  # Job 9: Coverage report and enforcement
  coverage-report:
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, behavioral-tests]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r tests/requirements.txt
          
      - name: Generate synthetic test corpus
        run: python tests/fixtures/synthetic_corpus_generator.py
        
      - name: Run full test suite with coverage
        run: |
          pytest \
            -v \
            -m "not performance" \
            --cov=core \
            --cov=app \
            --cov=api \
            --cov-report=xml:reports/coverage.xml \
            --cov-report=html:reports/coverage-html \
            --cov-report=term \
            --junitxml=reports/junit-full.xml \
            --cov-fail-under=${{ env.COVERAGE_THRESHOLD }} \
            -n auto
            
      - name: Generate test summary
        if: always()
        run: python tests/scripts/test_reporter.py
        
      - name: Upload coverage reports
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: coverage-reports
          path: reports/
          
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./reports/coverage.xml
          flags: full
          name: full-test-suite
          
      - name: Comment PR with test results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const summary = JSON.parse(fs.readFileSync('reports/summary.json', 'utf8'));
            const comment = `## 🧪 Test Suite Results
            
            **Status**: ${summary.all_passed ? '✅ PASSED' : '❌ FAILED'}
            
            | Category | Passed | Failed | Total |
            |----------|--------|--------|-------|
            | Unit | ${summary.unit.passed} | ${summary.unit.failed} | ${summary.unit.total} |
            | Integration | ${summary.integration.passed} | ${summary.integration.failed} | ${summary.integration.total} |
            | Behavioral | ${summary.behavior.passed} | ${summary.behavior.failed} | ${summary.behavior.total} |
            | Security | ${summary.adversarial.passed} | ${summary.adversarial.failed} | ${summary.adversarial.total} |
            
            **Coverage**: ${summary.coverage}%
            ${summary.coverage < ${COVERAGE_THRESHOLD} ? '⚠️ Below threshold!' : '✅ Meets threshold'}
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # Job 10: Mutation testing (weekly)
  mutation-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r tests/requirements.txt
          pip install mutmut
          
      - name: Run mutation tests
        run: |
          mutmut run --paths-to-mutate=core,app,api || true
          mutmut results > reports/mutation_results.txt
          mutmut html
          
      - name: Upload mutation test results
        uses: actions/upload-artifact@v3
        with:
          name: mutation-test-results
          path: |
            reports/mutation_results.txt
            html/

# Notification on failure
  notify-failure:
    runs-on: ubuntu-latest
    needs: [coverage-report]
    if: failure()
    steps:
      - name: Send notification
        run: echo "Tests failed - notification would be sent here"
        # Add Slack/email notification here
