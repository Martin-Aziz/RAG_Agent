# =============================================================================
# Production RAG System Configuration
# =============================================================================

# Feature Flags
# -----------------------------------------------------------------------------
features:
  multi_agent_mode: false              # Enable AutoGen/CrewAI multi-agent orchestration
  graphrag_enabled: true               # Enable Neo4j GraphRAG layer
  self_rag_verification: true          # Enable Self-RAG verification loops
  intent_routing: true                 # Enable pre-retrieval intent classification
  hybrid_retrieval: true               # Enable BM25 + vector hybrid search
  cross_encoder_reranking: true        # Enable cross-encoder reranking
  hierarchical_memory: true            # Enable tiered memory management
  human_in_the_loop: false            # Enable human approval for low-confidence answers

# Models & Embeddings
# -----------------------------------------------------------------------------
models:
  llm:
    provider: "ollama"                 # ollama, openai, anthropic
    model_name: "llama2"
    temperature: 0.1
    max_tokens: 2048
    timeout: 30
  
  embeddings:
    provider: "ollama"
    model_name: "qwen3-embedding:latest"
    dimension: 768
    batch_size: 32
  
  reranker:
    model_name: "cross-encoder/ms-marco-MiniLM-L-6-v2"
    device: "cpu"                      # cpu or cuda
    max_length: 512

# Intent Routing & Safety
# -----------------------------------------------------------------------------
router:
  intent_classifier:
    enabled: true
    confidence_threshold: 0.75         # Route to RAG if confidence < threshold
    smalltalk_patterns:
      - "hello"
      - "hi"
      - "hey"
      - "goodbye"
      - "bye"
      - "thanks"
      - "thank you"
    
  faq_matcher:
    enabled: true
    similarity_threshold: 0.85
    max_results: 3
  
  safety:
    enabled: true
    jailbreak_detection: true
    max_query_length: 1000

# Retrieval Pipeline
# -----------------------------------------------------------------------------
retrieval:
  hybrid:
    bm25_weight: 0.5
    vector_weight: 0.5
    rrf_k: 60                          # RRF constant
    candidate_pool_size: 50            # Candidates before reranking
  
  reranking:
    enabled: true
    top_k: 10                          # Final results after reranking
    min_score: 0.0
  
  chunking:
    strategy: "semantic"               # semantic, fixed, hierarchical
    chunk_size: 500
    chunk_overlap: 50
    min_chunk_size: 100

# GraphRAG Configuration
# -----------------------------------------------------------------------------
graphrag:
  neo4j:
    uri: "bolt://localhost:7687"
    user: "neo4j"
    password: "password"
    database: "neo4j"
  
  entity_extraction:
    enabled: true
    entity_types: ["PERSON", "ORGANIZATION", "LOCATION", "CONCEPT"]
    relation_types: ["RELATED_TO", "WORKS_AT", "LOCATED_IN", "DEPENDS_ON"]
  
  traversal:
    max_hops: 3
    max_nodes: 100
    min_relevance: 0.5

# Self-RAG Verification
# -----------------------------------------------------------------------------
verification:
  enabled: true
  
  retrieval_grading:
    enabled: true
    min_relevance_score: 0.6
    max_retries: 2
  
  answer_verification:
    enabled: true
    min_support_score: 0.7
    hallucination_threshold: 0.3
    
  correction_policy:
    re_retrieve_threshold: 0.5
    refuse_threshold: 0.3
    hedge_low_confidence: true

# Memory Management
# -----------------------------------------------------------------------------
memory:
  short_term:
    enabled: true
    max_turns: 5
    max_tokens: 2000
  
  session:
    enabled: true
    max_turns: 20
    max_tokens: 8000
    summarize_after: 10
  
  long_term:
    enabled: true
    max_facts: 100
    relevance_threshold: 0.6
  
  semantic_switching:
    enabled: true
    topic_similarity_threshold: 0.7

# Orchestration (LangGraph)
# -----------------------------------------------------------------------------
orchestration:
  max_iterations: 10
  timeout_seconds: 60
  checkpoint_enabled: true
  checkpoint_backend: "memory"         # memory, sqlite, postgres
  
  human_approval:
    enabled: false
    confidence_threshold: 0.5
    timeout_seconds: 300

# Multi-Agent Configuration (AutoGen/CrewAI)
# -----------------------------------------------------------------------------
agents:
  framework: "autogen"                 # autogen, crewai
  
  roles:
    planner:
      enabled: true
      model: "llama2"
    
    extractor:
      enabled: true
      model: "llama2"
    
    qa_specialist:
      enabled: true
      model: "llama2"
    
    judge:
      enabled: true
      model: "llama2"
    
    finalizer:
      enabled: true
      model: "llama2"

# Observability & Monitoring
# -----------------------------------------------------------------------------
observability:
  tracing:
    enabled: true
    backend: "langsmith"               # langsmith, arize, local
    sample_rate: 1.0
  
  metrics:
    enabled: true
    export_prometheus: true
    export_interval_seconds: 60
  
  logging:
    level: "INFO"                      # DEBUG, INFO, WARNING, ERROR
    format: "json"
    redact_pii: true
  
  artifacts:
    save_retrieved_passages: true
    save_prompts: true
    save_intermediate_steps: true
    retention_days: 30

# Performance & Limits
# -----------------------------------------------------------------------------
performance:
  max_concurrent_requests: 10
  request_timeout_seconds: 60
  retrieval_timeout_seconds: 10
  generation_timeout_seconds: 30
  
  caching:
    enabled: true
    ttl_seconds: 3600
    max_size: 1000

# Evaluation
# -----------------------------------------------------------------------------
evaluation:
  enabled: true
  test_suite_path: "tests/scenario/"
  
  metrics:
    - "accuracy"
    - "hallucination_rate"
    - "latency_p50"
    - "latency_p95"
    - "cost_per_query"
    - "fallback_rate"
  
  seeds:
    - 42
    - 123
    - 456
